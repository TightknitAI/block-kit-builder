name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Everything below runs only when release-please merges its PR and
      # creates a release. Publish-side gating is intentionally minimal:
      # lint + typecheck + build. The full test suite (incl. Playwright)
      # already ran in CI against the same commit before release-please
      # merged it to main, and re-installing Chromium on the npm-token-
      # bearing job widens the supply-chain surface for no security gain.
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.releases_created }}

      - uses: ./.github/actions/setup
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm run lint
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm run typecheck
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm run build:clean
        if: ${{ steps.release.outputs.releases_created }}

      # Trusted Publisher (OIDC) needs npm CLI >= 11.5.1; Node 22 ships with
      # npm 10.x, and pnpm <11.0.7 does not perform the OIDC exchange. So we
      # publish with npm from the upgraded CLI instead of `pnpm publish`.
      - run: npm install -g npm@latest
        if: ${{ steps.release.outputs.releases_created }}

      - run: npm publish --provenance --access public
        if: ${{ steps.release.outputs.releases_created }}
