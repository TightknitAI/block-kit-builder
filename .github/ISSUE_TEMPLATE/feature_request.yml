name: Feature request
description: Suggest an idea or enhancement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem you are trying to solve before jumping to a solution — it helps us evaluate alternatives.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected?
      placeholder: As a builder user, I want to copy a block configuration as JSON so I can paste it into a backend test fixture.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Sketch the API surface if it touches package exports or props.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have weighed and why they fall short.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Reminder — this package is integration-agnostic. Anything Slack-API-shaped (channels, OAuth, sending) belongs in the consumer.
      options:
        - label: My request is about the builder UI / state / exports, not Slack API integration.
          required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
